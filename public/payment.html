<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата — Punch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/landing.css?v=19" />
</head>
<body class="page-landing page-register">
  <div class="landing-hero-bg" aria-hidden="true"></div>
  <canvas id="purpleRays" class="purple-rays-canvas" aria-hidden="true"></canvas>
  <div class="landing-noise" aria-hidden="true"></div>

  <header class="site-header landing-header is-solid">
    <nav class="header-nav">
      <a href="/#hero">Главная</a>
      <a href="/#pricing">Цены</a>
    </nav>
    <a href="/" class="header-brand visible">
      <span class="brand-p">P</span><span class="brand-text">unch</span>
    </a>
    <div class="header-actions"></div>
  </header>

  <main class="register-main">
    <div class="register-wrap" style="grid-template-columns: 1fr; max-width: 480px;">
      <div class="register-card fall-text-skip glass-block" style="width: 100%;">
        <h1 class="page-title" style="margin-bottom: 8px;">Оплата CryptoBot</h1>
        <p class="auth-lead" id="paymentInfo">Подготовка счёта…</p>
        <p class="auth-lead" id="paymentHint" style="font-size:0.88rem;opacity:0.7;"></p>
        <p class="form-error" id="paymentError" role="alert"></p>
        <a href="#" id="payLink" class="btn-landing btn-landing-accent btn-block" target="_blank" rel="noopener">Открыть CryptoBot</a>
        <p class="auth-switch" style="margin-top: 16px;">
          <a href="/cabinet.html">Кабинет</a> · <a href="/#pricing">Тарифы</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get('order');
    const payUrl = params.get('url') || 'https://t.me/send?start=IVmm6S9JZYCJ';
    const plan = params.get('plan') || '';
    const price = params.get('price') || '';
    const manual = params.get('manual') === '1';
    const info = document.getElementById('paymentInfo');
    const hint = document.getElementById('paymentHint');
    const err = document.getElementById('paymentError');
    const link = document.getElementById('payLink');
    const token = localStorage.getItem('punch-token');

    link.href = payUrl;

    if (!token) {
      location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search);
    } else if (!orderId) {
      info.textContent = 'Заказ не найден';
      link.hidden = true;
    } else {
      info.textContent = `${plan || 'Заказ #' + orderId}${price ? ' · ' + price + ' ₽' : ''}`;
      if (manual) {
        hint.textContent = `Заказ #${orderId}. Оплати в @send и укажи номер заказа в комментарии.`;
      }

      let timer;

      async function poll() {
        try {
          const res = await fetch('/api/payments/' + orderId, {
            headers: { Authorization: 'Bearer ' + token },
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Ошибка');

          info.textContent = `${data.plan} · ${data.amountRub} ₽ · статус: ${data.status}`;

          if (data.status === 'paid') {
            clearInterval(timer);
            info.textContent = 'Оплата получена! Подписка активирована.';
            link.textContent = 'Перейти в кабинет';
            link.href = '/cabinet.html';
            link.removeAttribute('target');
            setTimeout(() => { location.href = '/cabinet.html'; }, 1500);
            return;
          }

          if (data.payUrl) link.href = data.payUrl;
        } catch (e) {
          err.textContent = e.message;
        }
      }

      poll();
      timer = setInterval(poll, 4000);
    }
  </script>
  <script src="/js/purple-rays.js"></script>
  <script src="/js/falling-letters.js?v=19"></script>
</body>
</html>
