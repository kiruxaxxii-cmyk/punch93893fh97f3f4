<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Punch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/landing.css?v=19" />
</head>
<body class="page-landing page-register page-login">
  <div class="landing-hero-bg" aria-hidden="true"></div>
  <canvas id="purpleRays" class="purple-rays-canvas" aria-hidden="true"></canvas>
  <div class="landing-noise" aria-hidden="true"></div>

  <header class="site-header landing-header" id="siteHeader">
    <nav class="header-nav">
      <a href="/#hero">Главная</a>
      <a href="/#pricing">Цены</a>
      <a href="/#download">Скачать</a>
    </nav>
    <a href="/" class="header-brand visible">
      <span class="brand-p">P</span><span class="brand-text">unch</span>
    </a>
    <div class="header-actions">
      <a href="/#pricing" class="btn-blur btn-accent">Тарифы</a>
    </div>
  </header>

  <main class="register-main">
    <div class="register-wrap">
      <div class="register-intro">
        <div class="landing-badge is-visible" data-fall-badge>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
          PUNCH // лаунчер 1.21.4
        </div>
        <h1 class="fall-text" id="loginTitle" data-text="Войди в Punch"></h1>
        <p class="auth-lead">Логин или email и пароль — доступ к кабинету и лаунчеру.</p>
        <ul class="register-features">
          <li class="auth-feature"><span>Скачивание с активной подпиской</span></li>
          <li class="auth-feature"><span>Активация ключей в кабинете</span></li>
          <li class="auth-feature"><span>Чат лаунчера после входа</span></li>
        </ul>
      </div>

      <div class="register-card fall-text-skip glass-block">
        <form id="loginForm" class="register-form" novalidate>
          <label>
            <span>Логин</span>
            <input type="text" name="login" placeholder="Логин или email" required autocomplete="username" />
          </label>
          <label>
            <span>Пароль</span>
            <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password" />
          </label>
          <p class="form-error" id="authError" role="alert"></p>
          <button type="submit" class="btn-landing btn-landing-accent btn-block">Войти</button>
        </form>
        <p class="auth-switch">Аккаунт выдаёт администратор. Войдите логином и паролем.</p>
      </div>
    </div>
  </main>

  <footer class="site-footer"><span>© 2026 Punch</span></footer>

  <script src="/js/purple-rays.js"></script>
  <script src="/js/falling-letters.js?v=19"></script>
  <script src="/js/common.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
