<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход в лоадер — Punch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0c0a12;
      color: #f5f5f7;
      font-family: Inter, system-ui, sans-serif;
    }
    .loader-auth-card {
      text-align: center;
      padding: 48px 40px;
      border-radius: 24px;
      background: rgba(20, 17, 28, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.25);
      backdrop-filter: blur(20px);
      max-width: 380px;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .loader-auth-card .brand-p { color: #a855f7; font-weight: 700; font-size: 2rem; }
    .loader-auth-card h1 { font-size: 1.35rem; margin: 16px 0 8px; }
    .loader-auth-card p { color: rgba(245,245,247,0.6); font-size: 0.9rem; line-height: 1.5; }
    .loader-auth-card .status { margin-top: 20px; font-size: 0.85rem; color: #c4b5fd; }
    .loader-auth-card .error { color: #f87171; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a855f7;
      margin-right: 8px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="loader-auth-card">
    <div class="brand-p">P</div>
    <h1 id="title">Подключаем лоадер</h1>
    <p id="message">Передаём сессию в Punch Loader…</p>
    <p class="status" id="status"><span class="pulse"></span>Ожидание</p>
  </div>
  <script src="/js/common.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session');
      const token = localStorage.getItem('punch-token');
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const status = document.getElementById('status');

      if (!sessionId || !token) {
        title.textContent = 'Ошибка';
        message.textContent = 'Сессия не найдена. Вернитесь в лоадер и попробуйте снова.';
        status.innerHTML = '<span class="error">Не удалось передать вход</span>';
        return;
      }

      try {
        const res = await fetch('/api/loader-handoff', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ sessionId }),
        });
        if (!res.ok) throw new Error('handoff failed');

        title.textContent = 'Готово!';
        message.textContent = 'Вход выполнен. Вернитесь в Punch Loader — меню откроется автоматически.';
        status.innerHTML = '✓ Сессия передана';
      } catch {
        title.textContent = 'Ошибка';
        message.textContent = 'Не удалось связаться с сервером.';
        status.innerHTML = '<span class="error">Попробуйте ещё раз</span>';
      }
    })();
  </script>
</body>
</html>
