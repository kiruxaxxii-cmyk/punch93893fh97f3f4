<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Unbounded:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/loader.css" />
</head>
<body class="dark">
<div class="outer-container">
  <div class="wrapper">
    <div class="title-drag-area" onmousedown="post('drag_window')"></div>
    <div class="window-controls">
      <div class="dot dot-orange" onclick="post('minimize')"></div>
      <div class="dot dot-red" onclick="post('close')"></div>
    </div>

    <div id="toast" class="toast">
      <div class="toast-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="toast-content">
        <span id="toast-title">Title</span>
        <span id="toast-desc">Desc</span>
      </div>
    </div>

    <!-- AUTH -->
    <div id="auth-screen" class="auth-screen">
      <div class="auth-logo font-unbounded"><span class="brand-p">P</span>unch</div>
      <div class="auth-title font-unbounded" id="authTitle">Вход</div>
      <div class="auth-subtitle text-main" id="authSubtitle">Авторизация через Punch</div>
      <form id="authForm" class="auth-form" onsubmit="return false;">
        <label class="auth-label" id="authLoginLabel">Логин
          <input type="text" id="authLogin" class="auth-input" placeholder="Логин или email" autocomplete="username" />
        </label>
        <label class="auth-label" id="authPassLabel">Пароль
          <input type="password" id="authPass" class="auth-input" placeholder="Пароль" autocomplete="current-password" />
        </label>
        <p class="auth-error" id="authError"></p>
        <button type="submit" class="btn-primary" id="authSubmitBtn">Войти</button>
      </form>
      <button type="button" class="btn-ghost" id="authSiteBtn">Войти через сайт</button>
      <p class="auth-status" id="authSiteStatus"></p>
    </div>

    <!-- MAIN -->
    <div id="main-screen" class="screen inactive-right">
      <div class="header-title font-unbounded text-accent">
        <svg class="logo-icon" viewBox="0 0 24 24"><path d="M12 2L2 7L12 12L22 7L12 2Z"/><path d="M2 17L12 22L22 17V7L12 12L2 7V17Z"/><path d="M12 22V12"/></svg>
        <span>Punch</span>
      </div>
      <div class="version-row font-unbounded text-accent">Minecraft 1.21</div>
      <div class="image-frame"></div>
      <div class="description font-medium text-main" id="mainDesc"></div>
      <div class="credits text-faint font-medium" id="menuUser">Player</div>
      <button type="button" class="menu-logout" id="menuLogoutBtn" onclick="logoutAccount()" title="Выйти">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
      <div class="btn-small btn-site font-semibold text-accent" id="btnSiteText" onclick="post('open_site')"></div>
      <div class="btn-small btn-settings font-semibold text-accent" id="btnSettingsText" onclick="goToSettings()"></div>
      <button id="mainLaunchBtn" class="btn-launch font-semibold" onclick="post('action_button')"></button>
    </div>

    <!-- SETTINGS -->
    <div id="settings-screen" class="screen inactive-right">
      <div class="screen-title text-accent" id="settingsTitle"></div>
      <div class="nick-group">
        <label class="nick-label" id="nickLabel"></label>
        <div class="nick-row">
          <input type="text" id="nicknameInput" class="nick-input" placeholder="Player" maxlength="16" spellcheck="false" autocomplete="off" />
          <button class="btn-nick-save" id="btnNickSave" onclick="saveNickname()"></button>
        </div>
      </div>
      <div class="ram-group">
        <div class="ram-header font-semibold text-accent">
          <span id="ramLabel"></span>
          <span id="ramValue">4096MB</span>
        </div>
        <input type="range" min="1024" max="8192" value="4096" step="256" class="slider" id="ramSlider" />
      </div>
      <div class="btn-extra-settings" id="btnExtraSettings" onclick="toggleExtraPanel()">
        <span id="extraSettLabel"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </div>
      <div class="btn-back font-semibold text-accent" id="btnSaveExit" onclick="saveAndExitSettings()"></div>
    </div>

    <!-- LOADING -->
    <div id="loading-screen" class="screen inactive-right">
      <div class="screen-title text-accent" id="loadingTitle"></div>
      <div class="loader-subtitle" id="loaderStatus"></div>
      <div class="loader-image-large">
        <div class="checkmark-container" id="successCheck">
          <svg class="checkmark-svg" viewBox="0 0 52 52"><circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/><path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/></svg>
        </div>
      </div>
      <div class="loader-stats-row"><span id="currentMb">0.0MB</span><span id="totalMb">...</span></div>
      <div class="loader-bar-bg-large"><div class="loader-bar-fill-large" id="loaderFill"></div></div>
      <div class="btn-cancel" id="btnCancelText" onclick="cancelInstall()"></div>
    </div>
  </div>

  <div class="extra-panel" id="extraPanel">
    <div class="extra-panel-inner">
      <div class="extra-title">PUNCH</div>
      <div class="extra-divider"></div>
      <div class="extra-section">
        <div class="extra-section-label" id="extraThemeLabel"></div>
        <div class="extra-toggle-row">
          <div class="toggle-btn" id="settBtnDark" onclick="toggleTheme('dark')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
          </div>
          <div class="toggle-btn" id="settBtnLight" onclick="toggleTheme('light')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </div>
        </div>
      </div>
      <div class="extra-section">
        <div class="extra-section-label" id="extraLangLabel"></div>
        <div class="extra-toggle-row">
          <div class="toggle-btn" id="settBtnRu" onclick="toggleLang('ru')">RU</div>
          <div class="toggle-btn" id="settBtnEn" onclick="toggleLang('en')">EN</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/loader.js"></script>
</body>
</html>
